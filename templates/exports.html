{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <div class="card-header">ملفات الإكسل المصدرة</div>
  <div class="card-body">
    {% if files|length == 0 %}
      لا توجد ملفات بعد.
    {% else %}
    <ul class="list-group">
      {% for f in files %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ f }}
        <a class="btn btn-outline-primary btn-sm" href="/exports_download/{{ f }}">تنزيل</a>
      </li>
      {% endfor %}
    </ul>
    {% endif %}
  </div>
</div>
{% endblock %}
